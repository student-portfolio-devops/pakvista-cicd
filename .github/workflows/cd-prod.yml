name: CD Production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://pakvista-prod.onrender.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}"

      - name: Confirmation
        run: echo "Production deployment completed successfully"