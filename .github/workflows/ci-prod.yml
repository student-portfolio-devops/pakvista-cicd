name: ci-prod

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-production:
    name: Production CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20


      - name: Install Dependencies
        run: npm install


      - name: Run HTML Lint
        run: npx htmlhint "**/*.html"


      - name: Run CSS Lint
        run: npx stylelint "**/*.css"


      - name: Build Check
        run: echo "Production build validation completed successfully"


      - name: Confirmation
        run: echo "CI Production workflow passed successfully"