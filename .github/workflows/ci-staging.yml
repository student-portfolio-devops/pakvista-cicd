name: ci-staging

on:
  pull_request:
    branches:
      - staging

jobs:
  lint-build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HTMLHint
        run: npx htmlhint "source/**/*.html"

      - name: Run Stylelint
        run: npx stylelint "styles/**/*.css"

      - name: Build project using Parcel
        run: npx parcel build "source/index.html" --dist-dir "dist" --public-url "/"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista-cicd:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista-cicd:staging-${{ github.sha }}