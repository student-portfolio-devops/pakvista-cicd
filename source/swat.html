    <section>
        <article>
            <h2>Discover Swat Valley</h2>
            <p>
                Swat Valley is a beautiful region of Khyber Pakhtunkhwa,
                known for its mountains, rivers, historical heritage,
                and rich cultural traditions.
            </p>
        </article>
    </section>


    <section>

        <article>
            <h2>Malam Jabba</h2>

            <figure>
                <div class="img-placeholder">
                    Malam Jabba Ski Resort Image Placeholder
                </div>

                <figcaption>
                    Malam Jabba is Pakistan's premier ski resort located at
                    2,804 meters elevation in Swat District. It offers skiing
                    and snowboarding during winter and hiking and chairlift
                    rides during summer.
                </figcaption>
            </figure>

        </article>


        <article>
            <h2>Mingora Bazaar</h2>

            <figure>
                <div class="img-placeholder">
                    Mingora Bazaar Image Placeholder
                </div>

                <figcaption>
                    Mingora Bazaar is the largest and most vibrant market
                    in Swat Valley. It is famous for emeralds, semi-precious
                    stones, traditional Swati embroidery, handicrafts,
                    and local culture.
                </figcaption>
            </figure>

        </article>


        <article>
            <h2>Swat Museum</h2>

            <figure>
                <div class="img-placeholder">
                    Swat Museum Image Placeholder
                </div>

                <figcaption>
                    Established in 1959, Swat Museum is one of Pakistan's
                    oldest museums. It contains more than 12,000 artifacts
                    from the Gandhara civilization, including Buddhist
                    sculptures, coins, and terracotta pieces.
                </figcaption>
            </figure>

        </article>

    </section>
